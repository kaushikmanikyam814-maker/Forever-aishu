<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever • Kaushik & Aishu ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Floating Hearts -->
<div id="heartContainer"></div>

<!-- INTRO SCREEN -->

<section id="intro" class="page active">

<div class="glass">

<h3 id="type1"></h3>

<h1 id="type2"></h1>

<p id="type3"></p>

<button id="continueBtn" class="primary hidden">
Continue ❤️
</button>

</div>

</section>

<!-- QUESTION SCREEN -->

<section id="question" class="page">

<div class="glass">

<h1 class="questionTitle">

Will you keep choosing us...

<br>

<span>forever?</span>

</h1>

<p class="subtitle">

Think carefully ❤️

</p>

<div class="buttonRow">

<button id="yesBtn" class="primary">

Yes Baby ❤️

</button>

<button id="noBtn" class="secondary">

No

</button>

</div>

<p id="funnyText"></p>

</div>

</section>

<!-- LOADING -->

<section id="loading" class="page">

<div class="loader">

<div class="pulseHeart">

❤️

</div>

<h2>

Loading our forever...

</h2>

</div>

</section>

<!-- RESULT -->

<section id="result" class="page">

<div class="glass resultCard">

<img src="art.png" id="artImage">

<h1>

Kaushik ♡ Aishu

</h1>

<div id="storyText">

<p></p>

</div>

<button id="letterButton" class="primary">

Open My Letter 💌

</button>

</div>

</section>

<!-- LETTER -->

<section id="letterPage" class="page">

<div class="letterPaper">

<h2>

Dear Aishu,

</h2>

<div id="letterContent">

</div>

<div class="signature">

Forever yours,

<br>

Kaushik ❤️

</div>

</div>

</section>

<!-- Ending -->

<section id="ending" class="page">

<div class="glass">

<h1 class="endingTitle">

The End?

</h1>

<p>

No...

Just the beginning.

</p>

<h2>

Forever.

</h2>

<h1 class="endingNames">

Kaushik ♡ Aishu

</h1>

</div>

</section>

<canvas id="confettiCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>

</html>
